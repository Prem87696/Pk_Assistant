 
<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:380px;
background:#1e293b;
border-radius:14px;
padding:20px;
display:flex;
flex-direction:column;
height:520px;
}

h2{
text-align:center;
margin-top:0;
}

.chat-box{
flex:1;
overflow-y:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.msg{
max-width:80%;
padding:10px;
margin:6px 0;
border-radius:10px;
font-size:14px;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.ai{
background:#334155;
align-self:flex-start;
}

.controls{
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
background:#3b82f6;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.voice{
margin-bottom:8px;
}

</style>

</head>

<body>

<div class="card">

<h2>PK AI Assistant</h2>

<div id="chat-box" class="chat-box"></div>

<button id="start-btn" class="voice">🎤 Bolne ke liye Dabayein</button>

<div class="controls">

<input id="text-input" placeholder="Message likhein..." />

<button id="send-btn">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
