<!DOCTYPE html>

<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:380px;
height:520px;
background:#1e293b;
border-radius:14px;
padding:20px;
display:flex;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin:0 0 10px 0;
font-size:20px;
}

.chat-box{
flex:1;
overflow-y:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:80%;
padding:10px;
margin:6px 0;
border-radius:10px;
font-size:14px;
line-height:1.4;
word-wrap:break-word;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.ai{
background:#334155;
align-self:flex-start;
}

.listen-btn{
margin-top:6px;
padding:5px 10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:12px;
cursor:pointer;
}

.listen-btn:hover{
background:#2563eb;
}

.voice{
margin-bottom:8px;
}

.controls{
display:flex;
gap:6px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
outline:none;
font-size:14px;
}

button{
background:#3b82f6;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="card">

<h2>PK AI Assistant</h2>

<div id="chat-box" class="chat-box"></div>

<button id="start-btn" class="voice">
🎤 Bolne ke liye Dabayein
</button>

<div class="controls">

<input 
id="text-input"
type="text"
placeholder="Message likhein..."
autocomplete="off"
/>

<button id="send-btn">
Send
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
