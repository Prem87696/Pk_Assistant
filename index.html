<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PK AI Assistant</title>

<style>
body{margin:0;background:#0f172a;font-family:Arial;color:white}

.assistant-btn{
position:fixed;bottom:25px;right:25px;
width:60px;height:60px;border-radius:50%;
background:#3b82f6;display:flex;align-items:center;
justify-content:center;font-size:26px;cursor:pointer;
}

.assistant-panel{
position:fixed;bottom:100px;right:25px;
width:360px;height:500px;background:#1e293b;
border-radius:12px;display:none;flex-direction:column;
}

.header{padding:12px;background:#273449;text-align:center}

.chat-box{flex:1;overflow-y:auto;padding:10px}

.msg{padding:8px;border-radius:8px;margin:6px 0;max-width:75%}

.user{background:#3b82f6;margin-left:auto}
.ai{background:#334155}

.input-area{display:flex;padding:10px;background:#273449}

.input-area input{flex:1;padding:8px;border:none;border-radius:6px}

button{margin-left:5px;padding:8px 10px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer}
</style>

</head>

<body>

<div class="assistant-btn" id="openAssistant">🤖</div>

<div class="assistant-panel" id="assistantPanel">

<div class="header">PK AI Assistant</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
<input id="text-input" placeholder="Message likhein...">
<button id="send-btn">Send</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
