<!DOCTYPE html>

<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:380px;
background:#1e293b;
border-radius:14px;
padding:20px;
display:flex;
flex-direction:column;
height:520px;
}

h2{
text-align:center;
margin-top:0;
}

.chat-box{
flex:1;
overflow-y:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:80%;
padding:10px;
margin:6px 0;
border-radius:10px;
font-size:14px;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.ai{
background:#334155;
align-self:flex-start;
}

/* INPUT AREA */

.input-area{
display:flex;
align-items:center;
background:white;
border-radius:10px;
padding:5px;
}

.input-area input{
flex:1;
border:none;
outline:none;
padding:10px;
font-size:14px;
border-radius:10px;
}

/* MIC BUTTON */

#mic-btn{
background:transparent;
border:none;
font-size:18px;
cursor:pointer;
margin-right:6px;
}

/* SEND BUTTON */

#send-btn{
background:#3b82f6;
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

#send-btn:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="card">

<h2>PK AI Assistant</h2>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">

<input
id="text-input"
placeholder="Message likhein..."
autocomplete="off"
/>

<button id="mic-btn">🎤</button>

<button id="send-btn">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
