```html
<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.card{
background:#1e293b;
padding:30px;
border-radius:14px;
width:340px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
}

#chat-display{
background:#334155;
padding:12px;
border-radius:8px;
min-height:50px;
margin:15px 0;
}

button{
background:#3b82f6;
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2563eb;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
margin-right:5px;
}

.row{
display:flex;
justify-content:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>PK AI Assistant</h2>

<div id="chat-display">Tiyar hai...</div>

<p id="status"></p>

<button id="start-btn">🎤 Bolne ke liye Dabayein</button>

<div class="row">

<input
id="text-input"
placeholder="Message likhein..."
autocomplete="off"
/>

<button id="send-btn">Send</button>

</div>

</div>

<script src="chat.js"></script>

</body>
</html>
