<!DOCTYPE html>

<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* FLOATING BUTTON */

.assistant-btn{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* PANEL */

.assistant-panel{
position:fixed;
bottom:110px;
right:25px;
width:380px;
height:540px;
background:#1e293b;
border-radius:16px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
display:none;
}

/* HEADER */

.header{
padding:14px;
background:#273449;
text-align:center;
font-weight:bold;
cursor:move;
}

/* CHAT */

.chat-box{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:10px;
font-size:14px;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.ai{
background:#334155;
align-self:flex-start;
}

/* INPUT */

.input-area{
display:flex;
gap:6px;
padding:10px;
background:#273449;
}

.input-area input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

/* BUTTONS */

#mic-btn{
background:transparent;
border:none;
font-size:20px;
color:white;
cursor:pointer;
}

#send-btn{
background:#3b82f6;
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* WAVE */

.wave{
display:flex;
gap:3px;
align-items:center;
height:20px;
}

.wave span{
width:3px;
height:10px;
background:#3b82f6;
animation:wave 1s infinite;
}

.wave span:nth-child(2){animation-delay:.2s}
.wave span:nth-child(3){animation-delay:.4s}

@keyframes wave{

0%{height:6px}
50%{height:20px}
100%{height:6px}

}

</style>

</head>

<body>

<div class="assistant-btn" id="openAssistant">
🤖
</div>

<div class="assistant-panel" id="assistantPanel">

<div class="header" id="dragHeader">
PK AI Assistant
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">

<input id="text-input" placeholder="Message likhein..." />

<button id="mic-btn">🎤</button>

<button id="send-btn">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
