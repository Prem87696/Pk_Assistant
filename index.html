<!DOCTYPE html>

<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3b82f6">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
}

/* FLOATING BUTTON */

.assistant-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
z-index:999;
}

/* ASSISTANT PANEL */

.assistant-panel{
position:fixed;
bottom:100px;
right:25px;
width:360px;
height:520px;
background:#1e293b;
border-radius:14px;
display:none;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* HEADER */

.header{
padding:12px;
background:#273449;
text-align:center;
font-weight:bold;
}

/* CHAT */

.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

/* MESSAGE */

.msg{
max-width:75%;
padding:8px;
border-radius:8px;
font-size:14px;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.ai{
background:#334155;
align-self:flex-start;
}

/* INPUT AREA */

.input-area{
display:flex;
gap:6px;
padding:10px;
background:#273449;
}

/* TEXT INPUT */

.input-area input{
flex:1;
padding:8px;
border:none;
border-radius:6px;
outline:none;
}

/* MIC BUTTON */

#mic-btn{
background:transparent;
border:none;
font-size:20px;
cursor:pointer;
color:white;
}

/* SEND BUTTON */

#send-btn{
background:#3b82f6;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
cursor:pointer;
}

#send-btn:hover{
background:#2563eb;
}

</style>

</head>

<body>

<!-- FLOATING ASSISTANT BUTTON -->

<div id="openAssistant" class="assistant-btn">
🤖
</div>

<!-- ASSISTANT PANEL -->

<div id="assistantPanel" class="assistant-panel">

<div class="header">
PK AI Assistant
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">

<input
id="text-input"
placeholder="Message likhein..."
autocomplete="off"
/>

<button id="mic-btn">🎤</button>

<button id="send-btn">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
