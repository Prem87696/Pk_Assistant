<!DOCTYPE html>

<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PK AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:420px;
height:560px;
background:#1e293b;
border-radius:14px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.header{
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
background:#273449;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:10px;
font-size:14px;
line-height:1.4;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:#3b82f6;
}

.ai{
align-self:flex-start;
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#273449;
gap:8px;
}

.input-area input{
flex:1;
border:none;
outline:none;
padding:10px;
border-radius:8px;
font-size:14px;
}

/* MIC BUTTON */

#mic-btn{
background:transparent;
border:none;
font-size:20px;
cursor:pointer;
color:white;
}

/* SEND BUTTON */

#send-btn{
background:#3b82f6;
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

#send-btn:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="card">

<div class="header">
PK AI Assistant
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">

<input
id="text-input"
placeholder="Message likhein..."
autocomplete="off"
/>

<button id="mic-btn">🎙️</button>

<button id="send-btn">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
